{% extends "../customer/base.html" %}

{% block content %}
<style>
    .card{
        background: linear-gradient(145deg, #120c1a, #1f1630);
        border-radius: 12px;
        color: #fff;
        border: 1px solid #7921f4;
        transition: 0.3s ease;
    }
</style>
<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-8">

      {% include "../notification/messages.html" %}

      <div class="card shadow-sm border-danger">
        <div class="card-body">
          <h4 class="mb-3 text-center text-danger">
            Delete transaction
          </h4>

          <div class="alert alert-warning text-center">
            Are you sure you want to delete this transaction?
          </div>

          <form method="post" class="pinner-form">
            {% csrf_token %}

            <div class="d-flex gap-2">
              <a href="{% url 'staff:admin_customer_transactions' transaction.portfolio.user.id %}" 
                 class="btn btn-secondary w-50 btn-sm fw-bold">
                 Cancel
              </a>

              <button type="submit"
                      class="btn btn-danger w-50 btn-sm fw-bold"
                      data-spinner-text="Deleting..."
                      data-spinner-class="btn-secondary w-50">
                Delete transaction
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
